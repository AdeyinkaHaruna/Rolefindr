<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { width: 340px; background: #1e1e24; color: #f0f0f8; }

    .header { background: linear-gradient(135deg, #4f46e5, #7c3aed); padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header span { font-size: 20px; }

    .body { padding: 14px 16px; }

    .field { margin-bottom: 10px; }
    .field label { font-size: 11px; font-weight: 600; color: #68688a; text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 4px; }
    .field input, .field select, .field textarea {
      width: 100%; background: #26262e; border: 1px solid #38384a; border-radius: 6px;
      padding: 7px 10px; color: #f0f0f8; font-size: 13px; resize: vertical;
    }
    .field input:focus, .field select:focus { outline: none; border-color: #4f46e5; }
    .field textarea { height: 70px; }

    .row { display: flex; gap: 8px; }
    .row .field { flex: 1; }

    .btn-save {
      width: 100%; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff;
      border: none; border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 700;
      cursor: pointer; margin-top: 6px;
    }
    .btn-save:hover { opacity: .9; }
    .btn-save:disabled { opacity: .4; cursor: not-allowed; }

    .status { margin-top: 10px; padding: 10px 12px; border-radius: 7px; font-size: 13px; font-weight: 500; display: none; }
    .status.success { background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.3); color: #4ade80; display: block; }
    .status.error   { background: rgba(239,68,68,.1);  border: 1px solid rgba(239,68,68,.3);  color: #f87171;  display: block; }

    .no-job { padding: 20px; text-align: center; color: #68688a; font-size: 13px; line-height: 1.6; }
    .no-job b { color: #a0a0b8; }

    select option { background: #26262e; }
  </style>
</head>
<body>
  <div class="header">
    <span>✈️</span>
    <h1>Save to JobPilot</h1>
  </div>

  <div class="body" id="main">
    <div class="no-job" id="loading">Detecting job info…</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
